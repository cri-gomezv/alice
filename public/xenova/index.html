<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TTS · Xenova español</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f0f12;
    --surface: #18181e;
    --surface2:#22222c;
    --border:  #2e2e3a;
    --accent:  #7c6af7;
    --green:   #4ed9aa;
    --amber:   #f7c46e;
    --red:     #f76a6a;
    --text:    #eae8f2;
    --muted:   #6e6d82;
    --radius:  12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .card-header {
    padding: 1.75rem 2rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .card-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .card-header h1 span { color: var(--accent); }

  .card-header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
  }

  .model-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    font-size: 11px;
    padding: 3px 10px;
    background: rgba(78,217,170,0.1);
    border: 1px solid rgba(78,217,170,0.2);
    border-radius: 20px;
    color: var(--green);
  }

  .card-body {
    padding: 1.75rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.65;
    padding: 0.9rem 1rem;
    resize: vertical;
    min-height: 110px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }

  .sliders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .val {
    font-size: 12px;
    color: var(--accent);
    min-width: 34px;
    text-align: right;
  }

  .btn-row { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 0.75rem 1.2rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) { opacity: 0.85; }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn.stop {
    flex: 0 0 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* status */
  .status {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.loading { background: var(--amber); animation: blink 1s ease-in-out infinite; }
  .dot.ready   { background: var(--green); }
  .dot.playing { background: var(--accent); animation: blink 0.6s ease-in-out infinite; }
  .dot.error   { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .progress-track.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }

  /* waveform canvas */
  .waveform-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
    background: rgba(124,106,247,0.07);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .waveform-wrap.visible { display: flex; }

  .waveform-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  canvas#waveform {
    width: 100%;
    height: 56px;
    border-radius: 6px;
    background: var(--surface2);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>texto <span>→</span> voz</h1>
    <p>100% local · sin APIs · audio en memoria · Xenova/Transformers.js</p>
    <div class="model-pill">● Xenova/mms-tts-spa — español nativo</div>
  </div>

  <div class="card-body">

    <div>
      <label>Texto en español</label>
      <textarea id="text-input">Hola, esto es una prueba de síntesis de voz en español, corriendo completamente en el navegador sin necesidad de servidores ni APIs externas.</textarea>
    </div>

    <div class="sliders">
      <div>
        <label>Velocidad</label>
        <div class="slider-row">
          <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0"
            oninput="document.getElementById('speed-val').textContent=parseFloat(this.value).toFixed(1)+'×'"/>
          <span class="val" id="speed-val">1.0×</span>
        </div>
      </div>
      <div>
        <label>Volumen</label>
        <div class="slider-row">
          <input type="range" id="volume" min="0" max="1" step="0.05" value="1.0"
            oninput="document.getElementById('vol-val').textContent=Math.round(this.value*100)+'%'"/>
          <span class="val" id="vol-val">100%</span>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="speak-btn" onclick="synthesize()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2">
          <polygon points="3,2 14,8 3,14"/>
        </svg>
        Generar y reproducir
      </button>
      <button class="btn stop" id="stop-btn" onclick="stopAudio()" title="Detener">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <rect x="3" y="3" width="10" height="10" rx="1.5"/>
        </svg>
      </button>
    </div>

    <div class="status">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span id="status-text">Listo — escribe un texto y pulsa el botón</span>
      </div>
      <div class="progress-track" id="prog-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>

    <div class="waveform-wrap" id="wave-wrap">
      <span class="waveform-label">reproduciendo</span>
      <canvas id="waveform"></canvas>
      <div class="time-row">
        <span id="time-cur">0:00</span>
        <span id="time-dur">0:00</span>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { pipeline, env } from './transformers-4.0.1.js';

env.allowLocalModels = false;

// ── state ────────────────────────────────────────────────────────────────────
let synthesizer   = null;   // pipeline cacheado
let audioCtx      = null;   // AudioContext reutilizable
let currentSource = null;   // BufferSourceNode activo
let animFrame     = null;   // requestAnimationFrame id
let analyser      = null;

// ── UI helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function setStatus(state, msg) {
  $('dot').className = 'dot ' + state;
  $('status-text').textContent = msg;
}

function setProgress(pct) {
  if (pct == null) {
    $('prog-track').classList.remove('visible');
  } else {
    $('prog-track').classList.add('visible');
    $('prog-fill').style.width = pct + '%';
  }
}

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

// ── waveform visualizer ───────────────────────────────────────────────────────
function startVisualizer(buffer) {
  const canvas = $('waveform');
  const ctx    = canvas.getContext('2d');
  canvas.width  = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  const draw = () => {
    animFrame = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArray);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#22222c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth   = 2;
    ctx.strokeStyle = '#7c6af7';
    ctx.beginPath();

    const slice = canvas.width / dataArray.length;
    let x = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const v = dataArray[i] / 128.0;
      const y = (v * canvas.height) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += slice;
    }
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
  };
  draw();
}

function stopVisualizer() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ── Float32 → AudioBuffer (en memoria, sin Blob) ──────────────────────────────
function float32ToAudioBuffer(samples, sampleRate) {
  const buffer = audioCtx.createBuffer(1, samples.length, sampleRate);
  buffer.getChannelData(0).set(samples);
  return buffer;
}

// ── stop ──────────────────────────────────────────────────────────────────────
window.stopAudio = () => {
  if (currentSource) {
    try { currentSource.stop(); } catch {}
    currentSource.disconnect();
    currentSource = null;
  }
  stopVisualizer();
  $('wave-wrap').classList.remove('visible');
  setStatus('ready', 'Detenido');
};

// ── synthesize ────────────────────────────────────────────────────────────────
window.synthesize = async () => {
  const text = $('text-input').value.trim();
  if (!text) return;

  // Detener audio previo y liberar memoria
  stopAudio();

  $('speak-btn').disabled = true;

  try {
    // 1. Cargar modelo (una sola vez, queda cacheado)
    if (!synthesizer) {
      setStatus('loading', 'Descargando modelo… (primera vez ~100 MB)');
      setProgress(0);

      synthesizer = await pipeline('text-to-speech', 'Xenova/mms-tts-spa', {
        progress_callback: ev => {
          if (ev.status === 'progress') {
            const p = Math.round(ev.progress || 0);
            setStatus('loading', `Descargando ${ev.file} — ${p}%`);
            setProgress(p);
          }
          if (ev.status === 'done') {
            setProgress(100);
          }
        }
      });
      setProgress(null);
    }

    // 2. Síntesis
    setStatus('loading', 'Sintetizando…');
    const output = await synthesizer(text);

    // 3. AudioContext (reutilizar si ya existe)
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // 4. Pasar Float32 directamente a AudioBuffer — sin Blob, sin URL, sin disco
    const audioBuffer = float32ToAudioBuffer(output.audio, output.sampling_rate);

    // 5. Analyser para visualizador
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    // 6. Nodo de ganancia para volumen
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = parseFloat($('volume').value);

    // 7. Conectar grafo: source → analyser → gain → speakers
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.playbackRate.value = parseFloat($('speed').value);
    source.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    currentSource = source;

    // 8. UI
    $('wave-wrap').classList.add('visible');
    $('time-dur').textContent = fmt(audioBuffer.duration);
    startVisualizer(audioBuffer);

    const startTime = audioCtx.currentTime;
    const tick = () => {
      if (!currentSource) return;
      $('time-cur').textContent = fmt(audioCtx.currentTime - startTime);
      requestAnimationFrame(tick);
    };
    tick();

    source.onended = () => {
      stopVisualizer();
      currentSource = null;
      // Liberar el buffer de memoria explícitamente
      source.buffer = null;
      $('wave-wrap').classList.remove('visible');
      setStatus('ready', 'Listo');
    };

    source.start();
    setStatus('playing', 'Reproduciendo…');
    setProgress(null);

  } catch (err) {
    console.error(err);
    setStatus('error', 'Error: ' + err.message);
    setProgress(null);
  } finally {
    $('speak-btn').disabled = false;
  }
};
</script>

</body>
</html>
